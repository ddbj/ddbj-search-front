#netlify settings
# This rule ensures the service worker is served correctly.
[[redirects]]
from = "/mockServiceWorker.js"
to = "/mockServiceWorker.js"
status = 200


[[redirects]]
from = "/search/assets/*"
to = "/search/assets/:splat"
status = 200
force = true

[[redirects]]
from = "/search/*"
to = "/search/index.html"
status = 200
