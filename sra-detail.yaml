        - definition [ref=e184]: DNA from fetal tissues was extracted according to the protocol as previously described(Rancati et al., 2008), except that the volume of Breaking Buffer and phenol/chloroform/IAA used was 400μL. Three consecutive phenol/chloroform/isoamylalcohol extractions were performed to reduce protein contamination. A final chloroform extraction was performed to remove phenol contamination, prior to ethanol precipitation. RNA contamination was removed by treating the gDNA samples with 70 ng/μl affinity-purified RNAse A (Ambion) for 1 h at +37 °C. Final yields were quantified with a ND- 1000 spectrophotometer (NanoDrop). Fetal microbiome reagent and environmental controls were concurrently performed during the DNA extraction process. Genomic DNA isolated from fetal tissues and control samples were treated with McrBC restriction enzyme (New England BioLabs) according to manufacturer's instructions, to remove host DNA and to enrich for microbial DNA. The treated DNA samples were purified using 0.8X ratio of AMPure XP beads (Beckman Coulter). The McrBC-treated, purified gDNA was quantified using Quant-iT TM Picogreen® dsDNA Assay kit (Invitrogen). For amplification of the 16S rRNA gene-variable regions three rounds of amplification were performed using 100ng of McrBC-treated gDNA with LongAmp Taq DNA polymerase (New England Biolabs) according to manufacturer's instructions. The first step aimed at enriching microbial sequences was performed using primers that amplify V2-V6 regions (Table S3). PCR cycling parameters consisted of initial denaturation step for 30s at 94°C, followed by 12 cycles of 15s at 94°C, 30s at 45°C, and 1min at 65°C with a final extension for 10 min at 65°C. Subsequently a nested PCR was performed targeting V4-V5 regions using the enriched V2-V6 amplicon as template. PCR Cycling parameters for amplifying V4-V5 regions were similar to V2- V6 PCR cycling profile, except that the extension was for 30s at 65 °C. The final amplification step involved addition of barcodes for identifying, de-multiplexing individual samples and Illumina adapter sequences to the V4-V5 enriched product using communal primers. Communal PCR amplification consisted of initial denaturation step for 30 s at 94 °C, followed by 30 cycles of 15s at 94 °C, 30s at 45°C, and 1 min at 65°C with a final extension for 10 min at 65°C. Equimolar concentrations of the prepared libraries were pooled and electrophoresed using 1% agarose gel. Pooled amplicon libraries were gel-purified using the Qiaquick Gel Extraction Kit (Qiagen). Integrity of gel-purified libraries were validated using the High Sensitivity DNA kit (Agilent Technologies). The libraries were quantified using KAPA Library Quantification Kit (Kapa Biosystems) to ascertain the loading concentration and sequenced on a HiSeq 2500 System (Illumina) operated in Rapid Run Mode to generate 2 ×250 bp paired-end reads 16S rRNA sequencing on HiSeq 2500 System (Illumina)
